<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TicTacToe</title>

    <link href="public/index.css" type="text/css" rel="stylesheet" />
    <script src="public/main.js"></script>
  </head>
  <body>
    <center><h1 id="game_title">TicTacToe</h1></center>
    <div id="app">
      <div>
        <h2 id="turn">It's <span id="player"></span>'s turn!</h2>
        <h2 id="win">
          <span id="winner"></span> wins!
          <button id="newGame">Play again?</button>
        </h2>
      </div>
      <div id="game">
        <table id="tictactoe">
          <tr>
            <td class="0 0"></td>
            <td class="0 1"></td>
            <td class="0 2"></td>
          </tr>
          <tr>
            <td class="1 0"></td>
            <td class="1 1"></td>
            <td class="1 2"></td>
          </tr>
          <tr>
            <td class="2 0"></td>
            <td class="2 1"></td>
            <td class="2 2"></td>
          </tr>
        </table>
        <div id="score">
          <h2>Game History</h2>
          <table>
            <thead>
              <tr>
                <th id="p1Name"></th>
                <th id="p2Name"></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td id="p1Score">0</td>
                <td id="p2Score">0</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <br><br>
    <div> 
      <center><small>Version: 3-test1.11</small></center>    <a href="#" onclick="showDebug(); return false;">Show Debug Console</a>
    </div>
    <br>
    <div hidden name="debug_output">
      <textarea readonly cols="120" rows="28" name="debug_output_text">
        Default textarea contents
      </textarea>
    </div>
  </body>
</html>
