<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TicTacToe</title>

    <link href="public/index.css" type="text/css" rel="stylesheet" />
    <script src="public/main.js"></script>
  </head>
  <body>
    <center><h1 id="game_title">TicTacToe</h1></center>
    <div id="app">
      <div>
        <h2 id="turn">It's <span id="player"></span>'s turn!</h2>
        <h2 id="win">
          <span id="winner"></span> wins!
          <button id="newGame">Play again?</button>
        </h2>
      </div>
      <div id="game">
        <table id="tictactoe">
          <tr>
            <td class="0 0"></td>
            <td class="0 1"></td>
            <td class="0 2"></td>
          </tr>
          <tr>
            <td class="1 0"></td>
            <td class="1 1"></td>
            <td class="1 2"></td>
          </tr>
          <tr>
            <td class="2 0"></td>
            <td class="2 1"></td>
            <td class="2 2"></td>
          </tr>
        </table>
        <div id="score">
          <h2>Game History</h2>
          <table>
            <thead>
              <tr>
                <th id="p1Name"></th>
                <th id="p2Name"></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td id="p1Score">0</td>
                <td id="p2Score">0</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <br><br>
    <div> 
      <center>
        <small>Version: 3-test1.25</small>
        &nbsp; - &nbsp;
        <a href="#" onclick="showDebug(); return false;"><small>Toggle Console</small></a>
      </center>
      <script>
        function showDebug() {
          console = document.getElementById('debug_output');
          console.hidden = !console.hidden;
          showText("Showing debug console");
        }
        function showText(newtext) { // Add text in the console window if it is not hidden
          console = document.getElementById('debug_output');
          if( !console.hidden) {
            addDebugText(newtext);
          }
        }
        function addDebugText(newtext) {
          debug_text = document.getElementById('debug_text');
          debug_text.value += "\n";
          debug_text.value += newtext;
          debug_text.scrollTop = debug_text.scrollHeight;
        }
        function clearText() {
          debug_text = document.getElementById('debug_text');
          debug_text.value = "";
        }
      </script>
    </div>
    <br>
    <div hidden id="debug_output">
      <button onClick="clearText()">Clear Output</button>
      &nbsp;
      <button onClick="printGameData()">Print Data</button>
      <br>
      <textarea readonly id="debug_text" cols="120" rows="10" name="debug_output_text">
Initial textarea contents
      </textarea>
    </div>
  </body>
</html>
